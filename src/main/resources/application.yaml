spring:
  security:
    jwt:
      secret: "my-super-secret-key-that-is-at-least-32-characters-long!"
      key-id: "my-secret-key-id"
  application:
    name: demo
  datasource:
    url: jdbc:h2:mem:testdb
    driverClassName: org.h2.Driver
    username: admin
    password: admin
    jpa:
      show-sql: true
      hibernate:
        ddl-auto: update
    h2:
      console:
        enabled: true
        path: /h2-console